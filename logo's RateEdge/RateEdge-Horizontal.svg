    <circle cx="48" cy="6" r="4.5" fill="#dc2626"/>
    <line x1="5" y1="48" x2="48" y2="48" stroke="#dc2626" stroke-width="2.5"/>
  </g>
  
  <!-- Text -->
  <text x="85" y="45" 
