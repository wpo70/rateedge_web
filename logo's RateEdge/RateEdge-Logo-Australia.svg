<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" width="320" height="140">
  <defs>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="curve-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Arc above text -->
  <g transform="translate(95, 12)">
    <path d="M 0 32 Q 35 28, 58 15 Q 80 2, 102 -5" 
          fill="none" 
          stroke="url(#curve-grad)" 
          stroke-width="3" 
          stroke-linecap="round"/>
    <circle cx="102" cy="-5" r="5" fill="#dc2626"/>
  </g>
  
  <!-- Text -->
  <text x="160" y="72" 
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="40" 
        font-weight="600" 
        text-anchor="middle" 
        letter-spacing="0.5">
    <tspan fill="url(#text-grad)">Rate</tspan><tspan fill="#dc2626">Edge</tspan>
  </text>
  
  <!-- Underline -->
  <line x1="52" y1="88" x2="268" y2="88" stroke="#dc2626" stroke-width="2.5"/>
  
  <!-- Australia tagline -->
  <text x="160" y="115" 
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="11" 
        font-weight="400" 
        fill="#64748b" 
        text-anchor="middle" 
        letter-spacing="3">
    AUSTRALIA
  </text>
</svg>
