        font-weight="600" 
        letter-spacing="0.5">
    <tspan fill="url(#text-grad)">Rate</tspan><tspan fill="#dc2626">Edge</tspan>
  </text>
  
  <!-- Australia tag -->
  <text x="270" y="45" 
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="12" 
        font-weight="400" 
